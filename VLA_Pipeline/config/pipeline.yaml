pipeline:
  mode: "hybrid"            # planner_only | reflex_only | hybrid
  heartbeat_sec: 2.0
  reflex_conf_threshold: 0.85
  reflex_cooldown_sec: 1.0
  event_bus_size: 512
  use_text_cli: true

planner:
  enabled: true
  config_path: "/home/ubuntu/New_Architecture/VLA_Agent_Core/config.yaml"
  # 用于检测 vLLM 是否已就绪（orchestrator 自动拉起时使用）
  base_url_for_healthcheck: "http://127.0.0.1:8000/v1"

vllm:
  autostart: true
  script_path: "/home/ubuntu/New_Architecture/VLA_Pipeline/scripts/run_vllm_server.sh"
  startup_timeout_sec: 90

execution:
  queue_size: 20

perception:
  enabled: true
  camera_width: 640
  camera_height: 480
  camera_fps: 30
  local_camera_index: 0
  unitree_network_interface: null
  unitree_timeout_sec: 3.0
  pose_model_path: "/home/ubuntu/New_Architecture/VLA_Pipeline/models/MediaPipe_Models/pose_landmarker_lite.task"
  hand_model_path: "/home/ubuntu/New_Architecture/VLA_Pipeline/models/MediaPipe_Models/hand_landmarker.task"
  num_hands: 2
  use_gpu_delegate: true
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  sequence_len: 100
  num_classes: 13
  gesture_conf_threshold: 0.85
  gesture_weights_path: null

resources:
  auto_pull: true
  model_dir: "/home/ubuntu/New_Architecture/VLA_Pipeline/models"
  gesture_repo_id: "Xuhui0101/best_mp_gesture_model"
  gesture_filename: "best_mp_gesture_model.pth"
  qwen_download_script: "/home/ubuntu/New_Architecture/VLA_Pipeline/scripts/download_qwen35_4b.py"
  pose_task_url: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task"
  hand_task_url: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task"
